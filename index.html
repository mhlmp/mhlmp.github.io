<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>MH Link Manager Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    
    <script id="offline-data" type="application/json"></script>
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --glass-blur: blur(10px);
            --text-primary: #1a1a1a;
            --text-secondary: #555555;
            --primary-color: #0066cc;
            --radius: 12px;
            --accent-green: #00a651;
            --accent-red: #d93025;
            --accent-gold: #f59e0b;
            --note-bg: rgba(255, 248, 220, 0.9);
            --google-btn: #4285F4;
        }

        body.dark-mode {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(30, 41, 59, 0.85); 
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --primary-color: #60a5fa;
            --note-bg: rgba(60, 50, 30, 0.8);
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            margin: 0; padding: 15px; padding-bottom: 100px;
            min-height: 100vh; transition: color 0.3s;
        }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); border-radius: var(--radius);
        }

        header { text-align: center; margin-bottom: 25px; }
        h1 { margin: 5px 0; font-size: 1.8rem; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        #itemCount {
            display: inline-block; background: rgba(127, 127, 127, 0.1); padding: 4px 15px;
            border-radius: 20px; font-size: 0.9rem; color: var(--text-secondary);
            border: 1px solid var(--glass-border); font-weight: 600;
        }
        
        #installAppBtn {
            display: none; margin: 10px auto; background: var(--primary-color); color: white; border: none;
            padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.95rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); animation: fadeIn 0.5s ease; border: 1px solid rgba(255,255,255,0.2);
        }

        #userSection { padding: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--glass-border); object-fit: cover; }
        .user-name { font-weight: 700; font-size: 1rem; }
        .cloud-status { font-size: 0.85rem; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; display: inline-block; }
        .status-dot.online { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
        .status-dot.offline { background: var(--accent-gold); box-shadow: 0 0 8px var(--accent-gold); }

        .btn-login { background: var(--google-btn); color: white; border: none; padding: 10px 24px; border-radius: 30px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .btn-action-sm { background: rgba(127,127,127,0.1); border: 1px solid var(--glass-border); color: var(--text-primary); padding: 8px 14px; border-radius: 8px; cursor: pointer; margin-left: 5px; }

        #welcomeScreen { display: none; flex-direction: column; align-items: center; text-align: center; padding: 40px 20px; background: var(--glass-bg); border-radius: var(--radius); border: 1px solid var(--glass-border); margin-top: 20px; }
        #welcomeScreen.visible { display: flex; }
        .lock-icon { font-size: 4rem; margin-bottom: 20px; opacity: 0.8; }
        .auth-required { transition: opacity 0.3s ease; }
        .auth-required.locked { display: none !important; }

        #controlsArea { padding: 16px; margin-bottom: 25px; display: flex; flex-direction: column; gap: 14px; z-index: 100; position: relative; }
        .search-container input { width: 100%; padding: 12px 16px; font-size: 16px; border: 1px solid var(--glass-border); border-radius: var(--radius); background: rgba(127,127,127,0.1); color: var(--text-primary); }
        .filters-container { display: flex; gap: 10px; flex-wrap: wrap; }
        .filters-container select { flex: 1; min-width: 140px; height: 44px; padding: 0 12px; background: rgba(127,127,127,0.1); color: var(--text-primary); border: 1px solid var(--glass-border); border-radius: var(--radius); }
        .filters-container select option { background: #1e293b; color: white; }

        .actions-container { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .dropdown { position: relative; display: inline-block; flex-grow: 1; }
        .action-btn { width: 100%; height: 44px; color: white; border: none; border-radius: var(--radius); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; }
        .btn-json { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
        .btn-txt { background: linear-gradient(135deg, #06b6d4, #0891b2); }
        .btn-site { background: linear-gradient(135deg, #6366f1, #4f46e5); } 
        .btn-trash-view { background: linear-gradient(135deg, #64748b, #475569); }
        .btn-toggle { background: rgba(127,127,127,0.1); color: var(--text-primary); border: 1px solid var(--glass-border); flex-grow: 0 !important; width: 44px; font-size: 1.2rem; }

        .dropdown-content { display: none; position: absolute; background: var(--glass-bg); backdrop-filter: blur(20px); min-width: 240px; box-shadow: 0 15px 40px rgba(0,0,0,0.3); border-radius: var(--radius); border: 1px solid var(--glass-border); z-index: 2000; right: 0; top: calc(100% + 8px); padding: 8px 0; }
        .dropdown-content.show { display: block; }
        .dropdown-content button, .dropdown-content label { color: var(--text-primary); padding: 12px 20px; display: block; background: none; border: none; width: 100%; text-align: right; cursor: pointer; font-size: 14px; }
        .dropdown-content button:hover, .dropdown-content label:hover { background-color: rgba(127,127,127,0.1); color: var(--primary-color); }
        input[type="file"] { display: none; }
        .dropdown-divider { border-top: 1px solid var(--glass-border); margin: 6px 0; }

        details { margin-bottom: 25px; }
        summary { padding: 16px; cursor: pointer; font-weight: 700; color: var(--primary-color); background: rgba(127,127,127,0.05); list-style: none; display: flex; justify-content: center; border-radius: var(--radius); }
        #addItemForm { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        #addItemForm input, #addItemForm textarea { padding: 12px; border: 1px solid var(--glass-border); border-radius: var(--radius); background: rgba(127,127,127,0.05); color: var(--text-primary); width: 100%; }
        #addItemForm button { background: var(--accent-green); color: white; padding: 14px; border: none; border-radius: var(--radius); font-weight: bold; cursor: pointer; }

        .category-block { margin-bottom: 35px; }
        .category-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 5px; margin-bottom: 15px; border-bottom: 2px solid rgba(127,127,127,0.1); }
        .category-header h2 { margin: 0; font-size: 1.4rem; font-weight: 700; }
        .category-badge { background: rgba(127,127,127,0.1); padding: 4px 12px; border-radius: 12px; font-weight: 600; font-size: 0.85rem; border: 1px solid var(--glass-border); }
        
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius); position: relative; display: flex; flex-direction: column; transition: transform 0.2s; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .card.pinned { border: 2px solid var(--accent-gold); background: rgba(255, 255, 0, 0.05); }
        .card-index { position: absolute; top: 12px; left: 12px; background: rgba(127,127,127,0.1); font-size: 11px; padding: 3px 8px; border-radius: 6px; font-family: monospace; color: var(--text-secondary); }
        .card-body { padding: 20px; padding-top: 40px; flex-grow: 1; }
        .card-link { display: block; color: var(--primary-color); font-weight: 700; text-decoration: none; margin-bottom: 10px; word-break: break-all; font-size: 16px; line-height: 1.4; }
        .card-text-content { background: rgba(127,127,127,0.05); padding: 12px; border-radius: 8px; font-family: monospace; font-size: 13px; white-space: pre-wrap; word-break: break-all; border: 1px solid var(--glass-border); }
        .card-desc { font-size: 15px; opacity: 0.9; margin-bottom: 10px; line-height: 1.5; }
        .card-note { margin-top: 12px; padding: 10px; background-color: var(--note-bg); color: #4a3b10; font-size: 13px; border-radius: 8px; border-right: 4px solid var(--accent-gold); display: flex; gap: 8px; }
        .card-footer { padding: 12px 20px; border-top: 1px solid var(--glass-border); background: rgba(127,127,127,0.05); display: flex; justify-content: space-between; align-items: center; border-radius: 0 0 var(--radius) var(--radius); }
        .tag-category { font-size: 11px; background: rgba(127,127,127,0.1); padding: 4px 10px; border-radius: 12px; border: 1px solid var(--glass-border); font-weight: 600; }
        .duplicate-badge { color: var(--accent-red); font-weight: bold; font-size: 12px; display: none; margin-left: 5px; background: rgba(239,68,68,0.1); padding: 2px 6px; border-radius: 4px; }
        .card-actions { display: flex; gap: 4px; }
        .icon-btn { background: transparent; border: none; cursor: pointer; font-size: 18px; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); transition: all 0.2s; }
        .icon-btn:hover { color: var(--primary-color); background: rgba(127,127,127,0.1); }
        .pin-btn.active { color: var(--accent-gold); transform: rotate(45deg); opacity: 1; }

        /* AI Card Styles */
        .ai-box { background: rgba(127,127,127,0.05); border: 1px solid var(--glass-border); padding: 12px; border-radius: 8px; margin-top: 12px; font-size: 13px; line-height: 1.5; }
        .ai-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-weight: bold; border-bottom: 1px solid rgba(127,127,127,0.1); padding-bottom: 5px;}
        .ai-status-active { color: var(--accent-green); }
        .ai-status-parked { color: var(--accent-gold); }
        .ai-status-dead { color: var(--accent-red); }
        .spinner-small { width: 14px; height: 14px; border: 2px solid transparent; border-top-color: var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-left: 5px; }

        #trashModal, #editModal, #settingsModal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--glass-bg); width: 90%; max-width: 600px; max-height: 80vh; border-radius: var(--radius); border: 1px solid var(--glass-border); display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { padding: 15px 20px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; overflow-y: auto; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(30, 41, 59, 0.95); color: white; border-radius: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.4); z-index: 9999; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s; opacity: 0; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; display: flex; flex-direction: column; min-width: 320px; }
        #toast.visible { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast-content { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        #undoBtn { background: rgba(255,255,255,0.1); border: 1px solid var(--accent-gold); color: var(--accent-gold); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.85rem; transition: 0.2s; white-space: nowrap; }
        
        #scrollTopBtn { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; border-radius: 50%; background: var(--primary-color); color: white; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 2000; opacity: 0; visibility: hidden; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        #scrollTopBtn.show { opacity: 1; visibility: visible; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        /* Selection mode */
        .card-checkbox { display: none; position: absolute; top: 12px; right: 12px; transform: scale(1.4); accent-color: var(--primary-color); pointer-events: none; z-index: 10; }
        body.selection-mode-active .card-checkbox { display: block; }
        body.selection-mode-active .card.selected { border: 2px solid var(--primary-color); background: rgba(96, 165, 250, 0.15); }
        body.selection-mode-active .card-actions { display: none; }
        body.selection-mode-active .card { cursor: pointer; }
        body.selection-mode-active .card-link { pointer-events: none; }
        #bulkActionBar { position: fixed; top: 0; left: 0; right: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--glass-border); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 5000; transform: translateY(-100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        #bulkActionBar.visible { transform: translateY(0); }
        .bulk-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end;}
        .bulk-btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body class="dark-mode">
    <div id="bulkActionBar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <input type="checkbox" id="selectAllCheckbox" style="transform: scale(1.4); cursor: pointer;">
            <span id="selectedCount" style="font-weight: bold; color: white;">0 נבחרו</span>
        </div>
        <div class="bulk-actions">
            <button class="bulk-btn" id="bulkMoveBtn">📂 העבר לקטגוריה</button>
            <button class="bulk-btn delete" id="bulkDeleteBtn" style="background: rgba(239, 68, 68, 0.2); border-color: var(--accent-red); color: #fca5a5;">🗑️ מחק</button>
            <button class="bulk-btn" id="cancelBulkBtn">✖ ביטול</button>
        </div>
    </div>
    
    <div id="devtools-overlay" style="display:none; position:fixed; inset:0; background:#090a0a; color:white; z-index:999999; text-align:center; padding-top:20%; font-family:monospace; flex-direction:column; align-items:center;">
        <h1>DevTools detected! Access denied.</h1>
    </div>

    <header>
        <h1>MH Link Manager Pro</h1>
        <div id="itemCount">ממתין להתחברות...</div>
    </header>

    <div id="userSection" class="glass-panel">
        <div id="loggedOutView" style="display:flex; width:100%; justify-content:center;">
            <button id="googleLoginBtn" class="btn-login"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="G"> התחבר עם Google</button>
        </div>
        <div id="loggedInView" style="display:none; width:100%; justify-content:space-between; align-items:center;">
            <div class="user-info">
                <img id="userAvatar" src="" class="user-avatar" alt="Avatar">
                <div>
                    <div id="userName" class="user-name">שם משתמש</div>
                    <div class="cloud-status"><span class="status-dot online"></span> מחובר <button id="forceReloadBtn" class="btn-action-sm" style="padding: 2px 5px">🔄</button></div>
                </div>
            </div>
            <div>
                <button id="openSettingsBtn" class="btn-action-sm" title="הגדרות מערכת">⚙️</button>
                <button id="switchAccountBtn" class="btn-action-sm">🔄</button>
                <button id="logoutBtn" class="btn-action-sm">יציאה</button>
            </div>
        </div>
    </div>

    <div id="welcomeScreen" class="visible">
        <div class="lock-icon">🔒</div>
        <h2>ברוך הבא לניהול הקישורים</h2>
        <p>הנתונים מסונכרנים לענן ומאובטחים.</p>
    </div>

    <div id="protectedContent" class="auth-required locked">
        <div id="controlsArea" class="glass-panel">
            <div class="search-container"><input type="search" id="searchInput" placeholder="🔍 חפש קישור, תיאור..."></div>
            <div class="filters-container">
                <select id="categoryFilter"><option value="">📂 כל הקטגוריות</option></select>
                <select id="sortOrder">
                    <option value="date-new" selected>📅 תאריך (חדש לישן)</option>
                    <option value="name">🔤 שם (א-ת)</option>
                </select>
            </div>

            <div class="actions-container">
                <div class="dropdown">
                    <button class="action-btn btn-json drop-trigger" data-target="jsonMenu"><span>📂</span> נתונים <span>▼</span></button>
                    <div id="jsonMenu" class="dropdown-content">
                        <label for="importJsonInput">📥 ייבוא JSON</label><input type="file" id="importJsonInput" accept=".json">
                        <button id="exportJsonBtn">📤 ייצוא JSON</button>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="action-btn btn-site drop-trigger" data-target="siteMenu"><span>🤖</span> אתר ו-AI <span>▼</span></button>
                    <div id="siteMenu" class="dropdown-content">
                        <button id="bulkAiScanBtn">✨ סרוק אוטומטית קישורים חסרים</button>
                        <div class="dropdown-divider"></div>
                        <button id="downloadHtmlBtn">🌐 שמור אתר (HTML)</button>
                    </div>
                </div>
                <button id="trashBtn" class="action-btn btn-trash-view">🗑️ סל מחזור</button>
                <button id="toggleDarkModeBtn" class="action-btn btn-toggle">☀️</button>
            </div>
        </div>

        <details class="glass-panel">
            <summary>▼ הוספת פריט חדש ▼</summary>
            <form id="addItemForm">
                <textarea id="itemContent" rows="2" required placeholder="הדבק קישור..."></textarea>
                <input type="text" id="itemDescription" placeholder="תיאור הפריט">
                <input type="text" id="itemCategory" list="categoriesDatalist" placeholder="קטגוריה">
                <datalist id="categoriesDatalist"></datalist>
                <button type="submit">הוסף למאגר</button>
            </form>
        </details>

        <div id="listContainer" class="list-container"></div>
    </div>

    <div id="trashModal"><div class="modal-content"><div class="modal-header"><h3>🗑️ סל מחזור</h3><button class="btn-close-modal" onclick="document.getElementById('trashModal').style.display='none'">✖</button></div><div id="trashList" class="modal-body"></div></div></div>
    
    <div id="settingsModal">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header"><h3>⚙️ הגדרות מערכת</h3><button class="btn-close-modal" onclick="document.getElementById('settingsModal').style.display='none'">✖</button></div>
            <div class="modal-body">
                <label style="display:block; margin-bottom:8px; font-weight:bold;">מפתח Gemini API (עבור סיכומי בינה מלאכותית):</label>
                <input type="password" id="geminiApiKeyInput" placeholder="AIzaSy..." style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--glass-border); background:rgba(127,127,127,0.1); color:var(--text-primary); margin-bottom: 15px;">
                <p style="font-size:12px; color:var(--text-secondary);">המפתח נשמר בדפדפן בלבד ואינו נשלח לשרת. <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:var(--primary-color);">השג מפתח חינם כאן</a>.</p>
                <button onclick="saveSettings()" style="width:100%; padding:10px; background:var(--primary-color); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">שמור הגדרות</button>
            </div>
        </div>
    </div>

    <div id="toast"><div class="toast-content"><span id="toastMsg">הודעה</span><button id="undoBtn">↪ בטל (Undo)</button></div></div>
    <button id="scrollTopBtn">☝️</button>

    <script type="module">

        import { getFirestore, doc, setDoc, onSnapshot, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {

            authDomain: "linkmeir-dada4.firebaseapp.com",
            projectId: "linkmeir-dada4",
            storageBucket: "linkmeir-dada4.firebasestorage.app",
            messagingSenderId: "933486826829",
            appId: "1:933486826829:web:6e61498d88a55623c65304"
        };

        const URL_REGEX = /^(https?:\/\/[^\s]+|t\.me\/[^\s]+|@\w+|[a-zA-Z0-9.-]+\.[a-z]{2,}\S*)/;
        let app, auth, db;
        let state = { items: [], trash: [], user: null, selectedIds: new Set(), isSelectionMode: false };

        try {
            app = initializeApp(firebaseConfig); auth = getAuth(app); setPersistence(auth, browserLocalPersistence);
            db = getFirestore(app); enableIndexedDbPersistence(db).catch(e => console.log('DB persistence issue', e));
        } catch (e) { console.error("Firebase Init Error:", e); }

        document.addEventListener('DOMContentLoaded', () => {
            initTheme(); setupEventListeners(); setupFirebaseListeners();
            // טעינת מפתח API השמור
            const savedKey = localStorage.getItem('geminiApiKey');
            if(savedKey) document.getElementById('geminiApiKeyInput').value = savedKey;
        });

        function setupEventListeners() {
            document.querySelectorAll('.drop-trigger').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation(); const tId = btn.getAttribute('data-target');
                    const isOpen = document.getElementById(tId).classList.contains('show');
                    document.querySelectorAll('.dropdown-content').forEach(el => el.classList.remove('show'));
                    if (!isOpen) document.getElementById(tId).classList.add('show');
                });
            });
            window.addEventListener('click', () => document.querySelectorAll('.dropdown-content').forEach(el => el.classList.remove('show')));

            document.getElementById('searchInput').addEventListener('input', renderList);
            document.getElementById('categoryFilter').addEventListener('change', renderList);
            document.getElementById('sortOrder').addEventListener('change', renderList);
            document.getElementById('addItemForm').addEventListener('submit', handleAdd);
            document.getElementById('toggleDarkModeBtn').addEventListener('click', toggleTheme);
            document.getElementById('googleLoginBtn').addEventListener('click', () => signInWithPopup(auth, new GoogleAuthProvider()));
            document.getElementById('logoutBtn').addEventListener('click', () => { signOut(auth); window.location.reload(); });
            document.getElementById('openSettingsBtn').addEventListener('click', () => document.getElementById('settingsModal').style.display='flex');
            document.getElementById('bulkAiScanBtn').addEventListener('click', startBulkAIScan);
        }

        window.saveSettings = function() {
            const key = document.getElementById('geminiApiKeyInput').value.trim();
            localStorage.setItem('geminiApiKey', key);
            document.getElementById('settingsModal').style.display='none';
            showToast('הגדרות נשמרו בהצלחה');
        }

        function setupFirebaseListeners() {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    state.user = user; toggleAppInterface(true);
                    document.getElementById('userName').textContent = user.displayName;
                    document.getElementById('userAvatar').src = user.photoURL;
                    onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                        if (docSnap.exists()) { const d = docSnap.data(); state.items = d.items || []; state.trash = d.trash || []; }
                        renderList(); updateCategoryDropdowns();
                    });
                } else { toggleAppInterface(false); }
            });
        }

        function toggleAppInterface(isLoggedIn) {
            document.getElementById('loggedInView').style.display = isLoggedIn ? 'flex' : 'none';
            document.getElementById('loggedOutView').style.display = isLoggedIn ? 'none' : 'flex';
            document.getElementById('welcomeScreen').classList.toggle('visible', !isLoggedIn);
            document.getElementById('protectedContent').classList.toggle('locked', !isLoggedIn);
        }

        async function pushToCloud() { if(state.user) await setDoc(doc(db, "users", state.user.uid), { items: state.items, trash: state.trash }); }

        function renderList() {
            if (!state.user) return;
            const container = document.getElementById('listContainer'); container.innerHTML = '';
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const catFilter = document.getElementById('categoryFilter').value;
            
            let sorted = [...state.items].sort((a,b) => b.date.localeCompare(a.date));
            let filtered = sorted.filter(i => (!catFilter || i.category === catFilter) && (!query || i.content.toLowerCase().includes(query) || i.description.toLowerCase().includes(query)));

            document.getElementById('itemCount').textContent = `מציג ${filtered.length} פריטים`;
            
            const grid = document.createElement('div'); grid.className = 'items-grid';
            filtered.forEach((item, idx) => grid.appendChild(createCard(item, idx + 1)));
            container.appendChild(grid);
        }

        function createCard(item, idx) {
            const div = document.createElement('div');
            div.className = `card ${item.isPinned ? 'pinned' : ''}`;
            
            // יצירת תוכן ה-AI במידה וקיים
            let aiHtml = '';
            if (item.isScanning) {
                aiHtml = `<div class="ai-box"><div class="spinner-small"></div> סורק אתר ומנתח...</div>`;
            } else if (item.aiSummary) {
                let statusClass = 'ai-status-unknown'; let statusText = 'לא ידוע';
                if(item.siteStatus === 'active') { statusClass = 'ai-status-active'; statusText = '🟢 מחובר ופעיל'; }
                else if(item.siteStatus === 'parked') { statusClass = 'ai-status-parked'; statusText = '🟠 דומיין למכירה/חניה'; }
                else if(item.siteStatus === 'dead') { statusClass = 'ai-status-dead'; statusText = '🔴 לא זמין/שבור'; }
                
                aiHtml = `<div class="ai-box">
                            <div class="ai-header"><span class="${statusClass}">${statusText}</span> <span style="font-size:11px; opacity:0.7">🤖 ניתוח AI</span></div>
                            <div>${escapeHtml(item.aiSummary)}</div>
                          </div>`;
            }

            const isLink = item.type === 'link';
            div.innerHTML = `
                <div class="card-index">#${idx}</div>
                <div class="card-body">
                    ${isLink ? `<a href="${escapeHtml(item.content)}" class="card-link" target="_blank">${escapeHtml(item.content)}</a>` : `<div class="card-text-content">${escapeHtml(item.content)}</div>`}
                    <div class="card-desc">${escapeHtml(item.description)}</div>
                    ${aiHtml}
                </div>
                <div class="card-footer">
                    <span class="tag-category">${escapeHtml(item.category)}</span>
                    <div class="card-actions">
                        ${isLink ? `<button class="icon-btn" onclick="scanSingleLink(${item.id})" title="נתח אתר עם בינה מלאכותית">🤖</button>` : ''}
                        <button class="icon-btn" onclick="copyText('${item.content}')" title="העתק">📋</button>
                        <button class="icon-btn trash-btn" onclick="moveToTrash(${item.id})" title="מחק">🗑️</button>
                    </div>
                </div>
            `;
            return div;
        }

        // ==========================
        // מנוע הבינה המלאכותית (AI)
        // ==========================
        window.scanSingleLink = async function(id) {
            const item = state.items.find(i => i.id === id);
            if (!item || item.type !== 'link') return;
            
            const apiKey = localStorage.getItem('geminiApiKey');
            if (!apiKey) return alert("כדי להשתמש בבינה מלאכותית, עליך להזין מפתח Gemini API בהגדרות המערכת (כפתור גלגל השיניים למעלה).");

            item.isScanning = true; renderList();

            try {
                // 1. קריאת האתר דרך שירות Proxy חינמי כדי לעקוף חסימת CORS
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(item.content)}`;
                const res = await fetch(proxyUrl);
                const data = await res.json();
                
                if (data.status.http_code >= 400 || !data.contents) {
                    item.siteStatus = 'dead';
                    item.aiSummary = `האתר אינו זמין (שגיאה ${data.status.http_code}). השרת למטה או שהדומיין נמחק.`;
                } else {
                    // חילוץ טקסט נקי מהקוד של האתר
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(data.contents, 'text/html');
                    doc.querySelectorAll('script, style, nav, footer, noscript').forEach(el => el.remove());
                    const textContent = doc.body ? doc.body.innerText.replace(/\s+/g, ' ').substring(0, 3000) : '';

                    // 2. פנייה למודל Gemini של גוגל
                    const prompt = `קרא את הטקסט הבא מאתר אינטרנט. החזר אך ורק אובייקט JSON חוקי עם 2 שדות:
                    1. "summary": סיכום בעברית של 1-2 משפטים על מה האתר הזה עושה.
                    2. "status": המילה "active" (אם זה אתר עם תוכן אמיתי) או "parked" (אם זה עמוד פרסומות, GoDaddy, דומיין למכירה).
                    טקסט האתר: ${textContent}`;

                    const aiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { response_mime_type: "application/json" }
                        })
                    });
                    
                    const aiData = await aiRes.json();
                    if(aiData.error) throw new Error(aiData.error.message);
                    
                    const jsonStr = aiData.candidates[0].content.parts[0].text;
                    const parsed = JSON.parse(jsonStr);
                    
                    item.aiSummary = parsed.summary;
                    item.siteStatus = parsed.status; 
                }
            } catch (e) {
                console.error(e);
                item.siteStatus = 'dead'; item.aiSummary = 'שגיאה: לא הצלחנו לקרוא את תוכן האתר (ייתכן שישנה חסימת אבטחה באתר היעד).';
            } finally {
                item.isScanning = false; pushToCloud(); renderList();
            }
        };

        window.startBulkAIScan = async function() {
            const apiKey = localStorage.getItem('geminiApiKey');
            if (!apiKey) return alert("אנא הזן מפתח API בהגדרות תחילה.");
            
            const linksToScan = state.items.filter(i => i.type === 'link' && !i.aiSummary);
            if(linksToScan.length === 0) return alert("כל הקישורים שלך כבר מנותחים!");
            
            if(!confirm(`נמצאו ${linksToScan.length} קישורים לסריקה. הפעולה תתבצע בהדרגה (כדי לא לחסום את המכסה של גוגל). להתחיל?`)) return;
            
            for(let i=0; i<linksToScan.length; i++) {
                showToast(`סורק ומנתח קישור ${i+1} מתוך ${linksToScan.length}...`);
                await scanSingleLink(linksToScan[i].id);
                // המתנה של 4 שניות בין בקשה לבקשה (15 בקשות בדקה בחינם)
                if(i < linksToScan.length -1) await new Promise(r => setTimeout(r, 4500)); 
            }
            showToast("סריקת ה-AI לכל האתרים הסתיימה בהצלחה!");
        };

        // פונקציות מערכת רגילות (הוספה, מחיקה)
        function handleAdd(e) {
            e.preventDefault();
            const content = document.getElementById('itemContent').value.trim();
            if (!content) return;
            
            const newItem = {
                id: Date.now(), content,
                description: document.getElementById('itemDescription').value.trim(),
                category: document.getElementById('itemCategory').value.trim() || 'כללי',
                date: new Date().toISOString(), 
                type: URL_REGEX.test(content) ? 'link' : 'text',
            };
            
            state.items.unshift(newItem); pushToCloud(); e.target.reset(); updateCategoryDropdowns();
            showToast('פריט נוסף בהצלחה');
            
            // מפעיל סריקת AI אוטומטית אם זה קישור ויש מפתח
            if (newItem.type === 'link' && localStorage.getItem('geminiApiKey')) {
                scanSingleLink(newItem.id);
            }
        }

        window.moveToTrash = function(id) {
            const idx = state.items.findIndex(i => i.id === id); if(idx === -1) return;
            state.trash.unshift(state.items[idx]); state.items.splice(idx, 1);
            pushToCloud(); showToast('הועבר לסל');
        }

        window.copyText = function(t) { navigator.clipboard.writeText(t).then(()=>showToast('הועתק ללוח')); }
        function escapeHtml(text) { return text ? text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;") : ''; }
        function initTheme() { if(localStorage.getItem('theme')==='light') document.body.classList.remove('dark-mode'); }
        function toggleTheme() { document.body.classList.toggle('dark-mode'); localStorage.setItem('theme', document.body.classList.contains('dark-mode')?'dark':'light'); }
        function updateCategoryDropdowns() {
            const cats = new Set(state.items.map(i => i.category));
            let html = '<option value="">📂 כל הקטגוריות</option>'; let listHtml = '';
            [...cats].sort().forEach(c => { html += `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`; listHtml += `<option value="${escapeHtml(c)}">`; });
            document.getElementById('categoryFilter').innerHTML = html; document.getElementById('categoriesDatalist').innerHTML = listHtml;
        }
        function showToast(msg) {
            const t = document.getElementById('toast'); document.getElementById('toastMsg').textContent = msg;
            t.classList.add('visible'); setTimeout(() => t.classList.remove('visible'), 4000);
        }
    </script>
</body>
</html>
