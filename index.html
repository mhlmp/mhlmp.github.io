<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>MH Link Manager Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    
    <script id="offline-data" type="application/json"></script>
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --glass-blur: blur(10px);
            --text-primary: #1a1a1a;
            --text-secondary: #555555;
            --primary-color: #0066cc;
            --radius: 12px;
            --accent-green: #00a651;
            --accent-red: #d93025;
            --accent-gold: #f59e0b;
            --note-bg: rgba(255, 248, 220, 0.9);
            --google-btn: #4285F4;
        }

        body.dark-mode {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(30, 41, 59, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --primary-color: #60a5fa;
            --note-bg: rgba(60, 50, 30, 0.8);
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

        html, body { overflow-x: hidden; max-width: 100vw; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            margin: 0;
            padding: 15px;
            padding-bottom: 130px;
            min-height: 100vh;
            transition: color 0.3s;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: var(--radius);
        }

        header { text-align: center; margin-bottom: 25px; }
        h1 { margin: 5px 0; font-size: 1.8rem; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        #itemCount {
            display: inline-block; background: rgba(127, 127, 127, 0.1); padding: 4px 15px;
            border-radius: 20px; font-size: 0.9rem; color: var(--text-secondary);
            border: 1px solid var(--glass-border); font-weight: 600;
        }
        
        #installAppBtn {
            display: none; margin: 10px auto; background: var(--primary-color); color: white; border: none;
            padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.95rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); animation: fadeIn 0.5s ease; border: 1px solid rgba(255,255,255,0.2);
        }

        #userSection { padding: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--glass-border); object-fit: cover; }
        .user-name { font-weight: 700; font-size: 1rem; }
        .cloud-status { font-size: 0.85rem; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; display: inline-block; flex-shrink: 0; }
        .status-dot.online { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
        .status-dot.offline { background: var(--accent-gold); box-shadow: 0 0 8px var(--accent-gold); }
        .status-dot.syncing { background: var(--primary-color); box-shadow: 0 0 8px var(--primary-color); animation: pulse 1.5s infinite; }
        .status-dot.error { background: var(--accent-red); box-shadow: 0 0 8px var(--accent-red); }

        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

        .btn-login { background: var(--google-btn); color: white; border: none; padding: 10px 24px; border-radius: 30px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .btn-action-sm { background: rgba(127,127,127,0.1); border: 1px solid var(--glass-border); color: var(--text-primary); padding: 8px 14px; border-radius: 8px; cursor: pointer; margin-left: 5px; font-size: 0.85rem; }

        #welcomeScreen { display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; background: var(--glass-bg); border-radius: var(--radius); border: 1px solid var(--glass-border); min-height: 80vh; margin-bottom: 20px; }
        #welcomeScreen.visible { display: flex !important; }
        
        .timer-ring { position: relative; width: 100px; height: 100px; margin-bottom: 20px; }
        .timer-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .timer-ring circle { fill: none; stroke-width: 6; stroke: rgba(127,127,127,0.2); }
        .timer-ring .progress { stroke: var(--primary-color); stroke-dasharray: 283; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear; }
        .timer-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        
        .auth-required { transition: opacity 0.3s ease; }
        .auth-required.locked { display: none !important; }

        #controlsArea {
            padding: 14px; margin-bottom: 25px;
            display: flex; flex-direction: column; gap: 12px;
            overflow: visible; position: relative; z-index: 100;
        }
        .search-container input {
            width: 100%; padding: 12px 16px; font-size: 16px;
            border: 1px solid var(--glass-border); border-radius: var(--radius);
            background: rgba(127,127,127,0.1); color: var(--text-primary);
        }
        .filters-container { display: flex; gap: 10px; flex-wrap: wrap; }
        .filters-container select {
            flex: 1; min-width: 130px; height: 44px; padding: 0 10px;
            background: rgba(127,127,127,0.1); color: var(--text-primary);
            border: 1px solid var(--glass-border); border-radius: var(--radius); font-size: 0.9rem;
        }
        .filters-container select option { background: #1e293b; color: white; }

        .actions-container { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; }

        .dropdown { position: relative; display: inline-block; flex-grow: 1; min-width: 0; }

        .action-btn {
            width: 100%; height: 42px; color: white; border: none; border-radius: var(--radius);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            gap: 6px; font-weight: 600; font-size: 0.88rem; white-space: nowrap; padding: 0 10px;
        }
        .btn-json { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
        .btn-txt { background: linear-gradient(135deg, #06b6d4, #0891b2); }
        .btn-site { background: linear-gradient(135deg, #6366f1, #4f46e5); }
        .btn-trash-view { background: linear-gradient(135deg, #64748b, #475569); }
        .btn-toggle {
            background: rgba(127,127,127,0.1); color: var(--text-primary);
            border: 1px solid var(--glass-border); flex-grow: 0 !important;
            width: 42px; font-size: 1.1rem;
        }
        .btn-toggle.dead-active {
            background: rgba(217, 48, 37, 0.2) !important;
            border-color: var(--accent-red) !important;
            box-shadow: 0 0 8px rgba(217,48,37,0.4);
        }

        .dropdown-content {
            display: none; position: absolute;
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            min-width: 220px; box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            border-radius: var(--radius); border: 1px solid var(--glass-border);
            z-index: 9000; top: calc(100% + 8px); right: 0; left: auto; padding: 8px 0;
        }
        .dropdown-content.show { display: block; }
        .dropdown-content button, .dropdown-content label {
            color: var(--text-primary); padding: 12px 18px; display: block;
            background: none; border: none; width: 100%; text-align: right;
            cursor: pointer; font-size: 14px; white-space: nowrap;
        }
        .dropdown-content button:hover, .dropdown-content label:hover { background-color: rgba(127,127,127,0.1); color: var(--primary-color); }
        input[type="file"] { display: none; }
        .dropdown-divider { border-top: 1px solid var(--glass-border); margin: 6px 0; }

        details { margin-bottom: 25px; }
        summary { padding: 16px; cursor: pointer; font-weight: 700; color: var(--primary-color); background: rgba(127,127,127,0.05); list-style: none; display: flex; justify-content: center; border-radius: var(--radius); }
        #addItemForm { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        #addItemForm input, #addItemForm textarea { padding: 12px; border: 1px solid var(--glass-border); border-radius: var(--radius); background: rgba(127,127,127,0.05); color: var(--text-primary); width: 100%; }
        #addItemForm button { background: var(--accent-green); color: white; padding: 14px; border: none; border-radius: var(--radius); font-weight: bold; cursor: pointer; }

        .category-block { margin-bottom: 35px; }
        .category-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 5px; margin-bottom: 15px; border-bottom: 2px solid rgba(127,127,127,0.1); }
        .category-header h2 { margin: 0; font-size: 1.3rem; font-weight: 700; }
        .category-badge { background: rgba(127,127,127,0.1); padding: 4px 12px; border-radius: 12px; font-weight: 600; font-size: 0.85rem; border: 1px solid var(--glass-border); white-space: nowrap; }
        
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }
        .card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius); position: relative; display: flex; flex-direction: column; transition: transform 0.2s, box-shadow 0.2s; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        .card.pinned { border: 2px solid var(--accent-gold); background: rgba(255, 255, 0, 0.05); }
        .card-index { position: absolute; top: 10px; left: 10px; background: rgba(127,127,127,0.15); font-size: 10px; padding: 2px 7px; border-radius: 6px; font-family: monospace; color: var(--text-secondary); z-index: 1; }
        .card-body { padding: 16px; padding-top: 36px; flex-grow: 1; }
        .card-link { display: block; color: var(--primary-color); font-weight: 700; text-decoration: none; margin-bottom: 8px; word-break: break-all; font-size: 15px; line-height: 1.4; }
        .card-text-content { background: rgba(127,127,127,0.05); padding: 10px; border-radius: 8px; font-family: monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; border: 1px solid var(--glass-border); }
        .card-desc { font-size: 14px; opacity: 0.9; margin-bottom: 8px; line-height: 1.5; }
        .card-note { margin-top: 10px; padding: 8px 10px; background-color: var(--note-bg); color: #4a3b10; font-size: 13px; border-radius: 8px; border-right: 4px solid var(--accent-gold); display: flex; gap: 8px; }

        .card-footer {
            padding: 8px 12px; border-top: 1px solid var(--glass-border);
            background: rgba(127,127,127,0.05); display: flex;
            justify-content: space-between; align-items: center;
            border-radius: 0 0 var(--radius) var(--radius); gap: 6px; min-height: 46px;
        }
        .card-footer-left { display: flex; align-items: center; gap: 4px; flex-shrink: 0; min-width: 0; }
        .tag-category {
            font-size: 10px; background: rgba(127,127,127,0.12); padding: 3px 8px;
            border-radius: 10px; border: 1px solid var(--glass-border); font-weight: 600;
            max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            flex-shrink: 1; display: inline-block;
        }
        .duplicate-badge {
            color: var(--accent-red); font-weight: bold; font-size: 11px;
            display: none; margin-right: 3px; background: rgba(239,68,68,0.1);
            padding: 2px 5px; border-radius: 4px; white-space: nowrap; flex-shrink: 0;
        }
        .card-actions { display: flex; gap: 1px; flex-shrink: 0; }
        .icon-btn {
            background: transparent; border: none; cursor: pointer; font-size: 15px;
            width: 30px; height: 30px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-secondary); transition: all 0.15s; flex-shrink: 0;
        }
        .icon-btn:hover { color: var(--primary-color); background: rgba(127,127,127,0.12); }
        .pin-btn.active { color: var(--accent-gold); }

        @media (max-width: 360px) {
            .icon-btn { width: 26px; height: 26px; font-size: 13px; }
            .tag-category { max-width: 70px; font-size: 9px; }
        }

        #trashModal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 8000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        #trashModal.open { display: flex; }
        .modal-content { background: var(--glass-bg); width: 90%; max-width: 600px; max-height: 80vh; border-radius: var(--radius); border: 1px solid var(--glass-border); display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { padding: 14px 18px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
        .modal-body { padding: 16px; overflow-y: auto; }
        .trash-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(127,127,127,0.05); margin-bottom: 8px; border-radius: 8px; border: 1px solid var(--glass-border); }

        #toast-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 9500; display: flex; flex-direction: column; align-items: center;
            gap: 10px; width: calc(100vw - 40px); max-width: 420px; pointer-events: none;
        }
        .toast-item {
            background: rgba(20, 30, 50, 0.97); color: white; border-radius: 12px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden; display: flex; flex-direction: column; width: 100%;
            pointer-events: auto; opacity: 0; transform: translateY(28px) scale(0.95);
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast-item.visible { opacity: 1; transform: translateY(0) scale(1); }
        .toast-item.leaving { opacity: 0; transform: translateY(-18px) scale(0.9); transition: all 0.28s ease-in; }
        .toast-content { padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; font-size: 14px; line-height: 1.4; width: 100%; box-sizing: border-box; }
        .toast-msg { flex-grow: 1; word-break: break-word; }
